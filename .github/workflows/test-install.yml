name: test-install

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-install-linux:
    name: "Test install.sh on Ubuntu"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Ensure Python 3.12 is available (graphifyy requirement)
      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Make the install script executable
      - name: Make install.sh executable
        run: chmod +x install.sh

      # Step 4: Run the full installation script
      - name: Run install.sh
        run: bash install.sh
        env:
          HOME: /home/runner

      # Step 5: Verify graphify CLI is accessible and working
      - name: Verify graphify is installed
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          graphify --version

      # Step 6: Verify RULES.md was copied to the correct config location
      - name: Verify RULES.md was copied
        run: |
          test -f "$HOME/.config/agent-rules-sync/RULES.md"
          echo "RULES.md exists at $HOME/.config/agent-rules-sync/RULES.md"

      # Step 7: Verify all skill files were installed to .agents/skills/
      - name: Verify skills were installed
        run: |
          test -d .agents/skills
          test -f .agents/skills/notebooklm.md
          test -f .agents/skills/wrapup.md
          test -f .agents/skills/README.md
          echo "All 3 skills installed correctly"
