# =============================================================================
# Antigravity Starter — CI Pipeline
# Tests the install.sh script on Ubuntu to verify cross-platform reliability.
#
# What we test:
#   1. Python 3.12 is available
#   2. install.sh runs without errors
#   3. graphify CLI is accessible (graphify --version)
#   4. Claude Code skill files were created (graphify install)
#   5. CLAUDE.md was copied to project root
#   6. Custom skills were installed to .claude/skills/
#
# Author:     Bilal Ansari
# Website:    https://ansaribilal.com
# Repository: https://github.com/Bilal140202/antigravity-starter
# License:    MIT
# =============================================================================

name: test-install

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-install-linux:
    name: "Test install.sh on Ubuntu"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Python 3.12 (graphifyy requires 3.10+)
      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Make the install script executable
      - name: Make install.sh executable
        run: chmod +x install.sh

      # Step 4: Run the full installation script
      - name: Run install.sh
        run: bash install.sh
        env:
          HOME: /home/runner

      # Step 5: Verify graphify CLI is installed and accessible
      - name: Verify graphify is installed
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          graphify --help

      # Step 6: Verify Claude Code skill was registered
      - name: Verify Claude Code skill exists
        run: |
          test -f "$HOME/.claude/skills/graphify/SKILL.md"
          echo "Claude Code skill installed at ~/.claude/skills/graphify/SKILL.md"

      # Step 7: Verify CLAUDE.md was copied to project root
      - name: Verify CLAUDE.md was copied
        run: |
          test -f "CLAUDE.md"
          echo "CLAUDE.md exists in project root"

      # Step 8: Verify custom skills were installed (all 20)
      - name: Verify skills were installed
        run: |
          test -d .claude/skills
          # Count skill directories with SKILL.md
          SKILL_COUNT=$(find .claude/skills -name "SKILL.md" | wc -l)
          echo "Found $SKILL_COUNT skills installed"
          test "$SKILL_COUNT" -ge 20
          # Spot-check a few key skills
          test -f .claude/skills/wrapup/SKILL.md
          test -f .claude/skills/researcher/SKILL.md
          test -f .claude/skills/security/SKILL.md
          echo "All skills verified"
